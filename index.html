<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArenaCash - MVP Onboarding</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Protótipo de onboarding ArenaCash">
      <section class="phone-frame">
        <header class="top-bar">
          <button class="icon-button" id="backButton" type="button" aria-label="Voltar">
            <span aria-hidden="true">←</span>
          </button>
          <div class="brand-lockup" aria-label="ArenaCash">
            <span class="brand-symbol">A</span>
            <span class="brand-wordmark">arenacash</span>
          </div>
          <span class="profile-chip">Ana</span>
        </header>

        <section class="screen" id="screenRoot" aria-live="polite"></section>

        <nav class="bottom-nav" aria-label="Navegação principal">
          <button class="nav-item is-active" type="button">
            <span aria-hidden="true">⌂</span>
            Home
          </button>
          <button class="nav-item" type="button">
            <span aria-hidden="true">◇</span>
            Investir
          </button>
          <button class="nav-item" type="button">
            <span aria-hidden="true">□</span>
            Carteira
          </button>
          <button class="nav-item" type="button">
            <span aria-hidden="true">◎</span>
            Cripto
          </button>
          <button class="nav-item" type="button">
            <span aria-hidden="true">○</span>
            Perfil
          </button>
        </nav>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
